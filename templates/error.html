<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — LynxPort</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="text-align:center;max-width:400px;padding:40px">
    <div style="font-size:64px;margin-bottom:16px;opacity:0.3">{{ code }}</div>
    <h1 style="font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text)">{{ message }}</h1>
    <p style="color:var(--text-muted);margin-bottom:24px">Something didn't go as planned. Let's get you back on track.</p>
    <a href="/login" class="btn btn--primary">Back to LynxPort</a>
  </div>
</body>
</html>
