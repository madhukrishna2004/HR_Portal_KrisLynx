services:
  - type: web
    name: krislynxllp-hr-portal
    env: python
    region: singapore   # change to: oregon, frankfurt, ohio as needed
    plan: free           # upgrade to starter ($7/mo) for always-on

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py

    healthCheckPath: /health

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: FIREBASE_PROJECT_ID
        value: miyraa-59c25
      - key: FIREBASE_STORAGE_BUCKET
        value: miyraa-59c25.appspot.com
      # ─── Set these manually in Render Dashboard after deploy ─────────────────
      # FIREBASE_SERVICE_ACCOUNT_JSON  →  paste full JSON content of serviceAccountKey.json
      # FIREBASE_API_KEY               →  from Firebase Console → Project Settings
      # FIREBASE_AUTH_DOMAIN           →  miyraa-59c25.firebaseapp.com
      # FIREBASE_MESSAGING_SENDER_ID   →  from Firebase Console
      # FIREBASE_APP_ID                →  from Firebase Console
