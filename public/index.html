<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KrisLynx HR Portal</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
background:#1e293b;
padding:40px;
border-radius:12px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.hr{
background:#3b82f6;
color:white;
}

.emp{
background:#10b981;
color:white;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>KrisLynx HR Portal</h1>
<p>Employee Management System</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="hr" onclick="login()">Login</button>

</div>

<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "hrportal-krislynx.firebaseapp.com",
projectId: "hrportal-krislynx",
storageBucket: "hrportal-krislynx.appspot.com",
messagingSenderId: "81190982339",
appId: "1:81190982339:web:7e5637b7967b2213aa8876"

};

firebase.initializeApp(firebaseConfig);

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)
.then((user)=>{

alert("Login successful")

})
.catch((error)=>{

alert(error.message)

})

}

</script>

</body>
</html>
